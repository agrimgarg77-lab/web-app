<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Communication App</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .chat-container {
            height: calc(100vh - 200px);
        }
        .messages-container {
            height: calc(100% - 60px);
            overflow-y: auto;
        }
        .video-container {
            position: relative;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
        }
        .video-element {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .screen-share-video {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
        }
        .file-preview {
            max-width: 200px;
            max-height: 150px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }
        .typing-indicator {
            display: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .online-indicator {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">
                <i class="fas fa-comments mr-2"></i>Web Communication App
            </h1>
            <div class="flex items-center space-x-4">
                <span id="userCount" class="text-sm">
                    <i class="fas fa-users mr-1"></i>
                    <span id="userCountNumber">0</span> users online
                </span>
                <button id="settingsBtn" class="bg-blue-700 hover:bg-blue-800 px-3 py-1 rounded text-sm">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto p-4">
        <!-- Join Room Section -->
        <div id="joinSection" class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4">Join a Room</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                    <input type="text" id="username" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Room ID</label>
                    <input type="text" id="roomId" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter room ID">
                </div>
                <button id="joinBtn" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
                    <i class="fas fa-sign-in-alt mr-2"></i>Join Room
                </button>
            </div>
        </div>

        <!-- Chat Room Section -->
        <div id="chatRoom" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <!-- Chat Area -->
                <div class="lg:col-span-2 bg-white rounded-lg shadow-md">
                    <div class="chat-container">
                        <div class="border-b p-4">
                            <h3 class="font-semibold text-lg">
                                <i class="fas fa-comments mr-2"></i>Room: <span id="currentRoom"></span>
                            </h3>
                        </div>
                        <div class="messages-container p-4" id="messagesContainer">
                            <!-- Messages will appear here -->
                        </div>
                        <div class="border-t p-4">
                            <div class="flex items-center space-x-2">
                                <input type="text" id="messageInput" class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type a message...">
                                <button id="sendBtn" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                            <div class="typing-indicator text-sm text-gray-500 mt-2">
                                <i class="fas fa-ellipsis-h"></i> Someone is typing...
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Side Panel -->
                <div class="space-y-4">
                    <!-- Users List -->
                    <div class="bg-white rounded-lg shadow-md p-4">
                        <h3 class="font-semibold mb-3">
                            <i class="fas fa-users mr-2"></i>Online Users
                        </h3>
                        <div id="usersList" class="space-y-2">
                            <!-- Users will appear here -->
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="bg-white rounded-lg shadow-md p-4">
                        <h3 class="font-semibold mb-3">
                            <i class="fas fa-tools mr-2"></i>Actions
                        </h3>
                        <div class="space-y-2">
                            <button id="shareScreenBtn" class="w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 transition">
                                <i class="fas fa-desktop mr-2"></i>Share Screen
                            </button>
                            <button id="stopScreenShareBtn" class="w-full bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 transition hidden">
                                <i class="fas fa-stop mr-2"></i>Stop Sharing
                            </button>
                            <label for="fileInput" class="w-full bg-purple-600 text-white py-2 px-4 rounded-md hover:bg-purple-700 transition cursor-pointer block text-center">
                                <i class="fas fa-file-upload mr-2"></i>Share File
                            </label>
                            <input type="file" id="fileInput" class="hidden" accept="image/*,.pdf,.doc,.docx,.txt">
                        </div>
                    </div>

                    <!-- Screen Share Area -->
                    <div id="screenShareArea" class="bg-white rounded-lg shadow-md p-4 hidden">
                        <h3 class="font-semibold mb-3">
                            <i class="fas fa-desktop mr-2"></i>Screen Share
                        </h3>
                        <video id="screenShareVideo" class="screen-share-video w-full" autoplay playsinline></video>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- File Preview Modal -->
    <div id="fileModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-6 max-w-4xl max-h-screen overflow-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">File Preview</h3>
                <button id="closeModal" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="modalContent">
                <!-- File content will appear here -->
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
